<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #43cea2, #185a9d);
        margin: 0;
        padding: 0;
    }

    .container {
        width: 500px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }

    select, input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #43cea2;
        color: white;
        border: none;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2bbf91;
    }

    .result {
        text-align: center;
        margin-top: 20px;
        font-size: 22px;
        color: green;
        font-weight: bold;
    }

    .back {
        margin-top: 10px;
        text-align: center;
    }

    .back a {
        text-decoration: none;
        color: #185a9d;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>📊 Student Prediction Form</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <label>Gender</label>
        <select name="gender" required>
            <option disabled selected value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select name="ethnicity" required>
            <option disabled selected value="">Select Group</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Education</label>
        <select name="parental_level_of_education" required>
            <option disabled selected value="">Select</option>
            <option value="associate's degree">Associate</option>
            <option value="bachelor's degree">Bachelor</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master</option>
            <option value="some college">College</option>
            <option value="some high school">School</option>
        </select>

        <label>Lunch Type</label>
        <select name="lunch" required>
            <option disabled selected value="">Select</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>

        <label>Test Preparation</label>
        <select name="test_preparation_course" required>
            <option disabled selected value="">Select</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required>

        <label>Writing Score</label>
        <input type="number" name="writing_score" min="0" max="100" required>

        <button type="submit">Predict Maths Score 🎯</button>

    </form>

    {% if results %}
    <div class="result">
        🎯 Predicted Score: {{ results }}
    </div>
    {% endif %}

    <div class="back">
        <a href="{{ url_for('index') }}">⬅ Back to Home</a>
    </div>

</div>

</body>
</html>
